<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Таскер</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            background: white;
            border-radius: 24px;
            padding: 32px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; margin-bottom: 24px; color: #2c3e50; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; color: #34495e; }
        input { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 1rem; }
        button { width: 100%; padding: 10px; background: #667eea; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.02); background: #5a67d8; }
        .link { text-align: center; margin-top: 16px; }
        .link a { color: #667eea; text-decoration: none; }
        .error { background: #fee; color: #e74c3c; padding: 8px; border-radius: 8px; margin-bottom: 16px; text-align: center; display: none; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2>Вход в Таскер</h2>
    <div id="errorMsg" class="error"></div>
    <form id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="password" required>
        </div>
        <button type="submit">Войти</button>
    </form>
    <div class="link">Нет аккаунта? <a href="/register">Зарегистрироваться</a></div>
</div>
<script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.style.display = 'none';
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            const res = await fetch('/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                window.location.href = '/';
            } else {
                const data = await res.json();
                errorDiv.textContent = data.detail || 'Ошибка входа';
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка соединения';
            errorDiv.style.display = 'block';
        }
    };
</script>
</body>
</html>
