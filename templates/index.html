<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Таскер - задачи и события</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="three-columns">
    <div class="tasks-panel">
        <h1>Мои задачи</h1>
        <div class="subtitle">Управляй своим временем</div>
        <div class="top-bar">
            <div class="stats" id="stats">
                <span>Всего: <span class="total" id="total-count">0</span></span>
                <span>Выполнено: <span class="completed" id="completed-count">0</span></span>
                <span>В работе: <span class="pending" id="pending-count">0</span></span>
            </div>
            <button class="add-task-btn" id="openModalBtn">+ Добавить задачу</button>
        </div>
        <div id="tasks-container" class="tasks-list">
            <div class="loading">Загрузка задач...</div>
        </div>
    </div>
    <div class="empty-area"></div>
    <div class="calendar-panel">
        <div class="calendar-nav">
            <button id="prevWeekBtn">←</button>
            <span id="weekRange" class="week-range"></span>
            <button id="nextWeekBtn">→</button>
        </div>
        <div id="weekCalendar" class="week-days"></div>

        <div class="events-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0 8px 0;">
                <h3 style="color: white; font-size: 1rem;">События</h3>
                <button id="addEventBtn" class="add-event-btn">+ Создать событие</button>
            </div>
            <div id="eventsList" class="events-list">
                <div class="no-events">В этот день нет событий</div>
            </div>
        </div>

        <div class="deadlines-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin: 15px 0 8px 0;">
                <h3 style="color: white; font-size: 1rem;">Дедлайны</h3>
                <button id="addDeadlineBtn" class="add-deadline-btn">+ Добавить дедлайн</button>
            </div>
            <div id="deadlinesList" class="deadlines-list">
                <div class="no-deadlines">Нет активных дедлайнов</div>
            </div>
        </div>
    </div>
</div>

<!-- Модалка для задач -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Новая задача</h2>
        <form id="taskForm">
            <input type="hidden" id="editTaskId" value="">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="taskName" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Дата *</label>
                    <input type="date" id="taskDate" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Начало *</label>
                    <input type="time" id="taskStartTime" required>
                </div>
                <div class="form-group">
                    <label>Конец *</label>
                    <input type="time" id="taskEndTime" required>
                </div>
            </div>
            <div class="form-group">
                <label>Категория</label>
                <input type="text" id="taskCategory" placeholder="Не указана">
            </div>
            <div class="form-group">
                <label>Важность</label>
                <select id="taskPriority">
                    <option value="Низкая">Низкая</option>
                    <option value="Средняя" selected>Средняя</option>
                    <option value="Высокая">Высокая</option>
                    <option value="Очень высокая">Очень высокая</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" id="closeModalBtn">Отмена</button>
                <button type="submit" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- Модалка для событий -->
<div id="eventModal" class="modal">
    <div class="modal-content">
        <h2 id="eventModalTitle">Новое событие</h2>
        <form id="eventForm">
            <input type="hidden" id="editEventId" value="">
            <div class="form-group">
                <label>Название события *</label>
                <input type="text" id="eventName" required>
            </div>
            <div class="form-group">
                <label>Дата *</label>
                <input type="date" id="eventDate" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" id="closeEventModalBtn">Отмена</button>
                <button type="submit" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<!-- Модалка для дедлайнов -->
<div id="deadlineModal" class="modal">
    <div class="modal-content">
        <h2 id="deadlineModalTitle">Новый дедлайн</h2>
        <form id="deadlineForm">
            <input type="hidden" id="editDeadlineId" value="">
            <div class="form-group">
                <label>Название *</label>
                <input type="text" id="deadlineName" required>
            </div>
            <div class="form-group">
                <label>Дата и время сгорания *</label>
                <input type="datetime-local" id="deadlineDateTime" required>
            </div>
            <div class="modal-buttons">
                <button type="button" class="btn-cancel" id="closeDeadlineModalBtn">Отмена</button>
                <button type="submit" class="btn-save">Сохранить</button>
            </div>
        </form>
    </div>
</div>

<script src="/static/js/main.js" defer></script>
</body>
</html>
